<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>
    
    <style>
        body {
            background-color: antiquewhite;
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
            padding: 20px
        }
        .secao {
            width: 90%;
            max-width: 800px;
        }
        .titulo {
            background-color: burlywood;
            border-radius: 8px;
            padding: 10px;
        }
        
    </style>

    <h2 class="titulo">Entre em contato comigo</h2>
    <p>Preencha o formulário abaixo para solicitar um orçamento ou tirar dúvidas sobre os serviços oferecidos.
        Responderei o mais breve possível com uma proposta personalizada para o seu projeto.</p>
    <form action="sarahkeyse.soeiro@gmail.com" method="post"></form>
    <label for="Nome">Nome completo</label>
    <input type="text" name="nome_cliente" size="100" placeholder="Digite seu nome completo" required>
    <br>
    <br>
    <label for="Telefone">Telefone</label>
    <input type="tel" name="telefone_cliente" placeholder="Digite seu telefone" required>
    <br>
    <br>
    <label for="E-mail:">E-mail</label>
    <input type="email" name="email_cliente" placeholder="Digite seu e-mail" required>
    <br>
    <br>
    <label for="Telefone">Telefone</label>
    <input type="tel" name="telefone_cliente" placeholder="Digite seu telefone" required>
    <br>
    <br>
    <label for="Tipo de cliente" required>Tipo de cliente</label>
    <select name="tipo_pessoa">
        <option value="física">Pessoa física</option>
        <option value="jurídica">Pessoa jurídica</option>
    </select>
    <br>
    <br>
    <label for="Serviço desejado" required></label>
    <input type="checkbox">Site simples
    <input type="checkbox">Site dinâmico
    <input type="checkbox">Site Avançados
    <br>
    <br>
    <label for="Horário para contato"></label>
    <select name="horário_contato" size="1" required>
        <option value="">Selecione</option>
        <option value="Manhã">Manhã</option>
        <option value="Tarde">Tarde</option>
        <option value="Noite">Noite</option>
    </select>
    <br>
    <br>
    <textarea name="Descrição" cols="245" rows="15" placeholder="Descreva seu projeto"></textarea>
    <br>
    <br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
    <br>
    <br>
    <br>
    <a href="../index.html">Página principal</a>
</body>

</html>
