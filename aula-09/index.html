<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula-09</title>
</head>

<body>

    <h1>Aula 9: Formulário</h1>

    <table border="2">
        <tbody>
            <form action="sarahkeyse.soeiro@gmail.com">
                <tr>
                    <td> <label for="nome">Nome:</label></td>
                    <td><input type="text" name="nome_usuario" size="50" maxlenght="" value=""
                            placeholder="Digite seu nome"></td>
                </tr>
                <tr>
                    <td><label for="e-mail pessoal:">E-mail pessoal:</label></td>
                    <td><input type="email" name="email_pessoal" placeholder="Digite seu email pessoal"></td>
                </tr>
                <tr>
                    <td><label for="E-mail (patter):">E-mail (patter):</label></td>
                    <td><input type="email" name="email_patter" placeholder="Digite seu email (patter)"></td>
                </tr>
                <tr>
                    <td><label for="senha">Senha:</label></td>
                    <td><input type="password" name="senha" placeholder="Digite sua senha"></td>
                </tr>
                <tr>
                    <td><label for="idade">Idade:</label></td>
                    <td><input type="number" max="100" min="0" name="idade" placeholder="Digite sua idade"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <p>Deixe um comentário:</p>
                        <textarea name="comentário" cols="50" rows="5"></textarea>
                    </td>
                </tr>
                <tr>
                    <td><label for="">Matéria de interesse:</label>
                        <br>
                        <input type="checkbox" name="BackEnd">BackEnd
                        <br>
                        <input type="checkbox" name="FrontEnd">FronEnd
                        <br>
                        <input type="checkbox" name="FullStack">FullStack
                    </td>
                    <td> <label for="">Tipo de Viagem</label>
                        <br>
                        <input type="radio" name="BackEnd">Negócios
                        <br>
                        <input type="radio" name="FrontEnd">Lazer
                        <br>
                        <input type="radio" name="FullStack">Turismo
                        <br>
                        <input type="radio" name="FullStack">Acadêmico
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Esporte favorito</label>
                        <select name="esporte" size="4">
                            <option value="fut">Futebol</option>
                            <option value="baska">Basquete</option>
                            <option value="volei">Vôlei</option>
                            <option value="tênis">Tênis</option>
                        </select>
                    </td>
                    <td>
                        <label for="">Investimentos</label>
                        <select name="investimentos" size="1">
                            <option value="poupanca">Poupança</option>
                            <option value="cdb">CDB</option>
                            <option value="tesouro">Tesouro Direto</option>
                            <option value="fundos">Fundos Imobiliários</option>
                            <option value="cdi">CDI</option>
                            <option value="debentures">Debêntures</option>
                            <option value="cripto">Criptomoedas</option>
                            <option value="acoes">Ações</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Escolha uma cor</label>
                        <input type="color" name="cor" style="color: black;">
                    </td>
                    <td>
                        <label for="">Selecione um arquivo:</label>
                        <input type="file" name="arquivo">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Data e hora de envio</label>
                        <input type="datetime" name="hora e data">
                    </td>
                </tr>





            </form>
        </tbody>
    </table>
